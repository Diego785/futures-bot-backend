services:

  futures-bot-backend:
    image: node:22-slim
    container_name: futures-bot-backend
    hostname: futures-bot-backend
    restart: always
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - TZ=America/La_Paz
    command: >
      sh -c "npm run build && npm run start:dev"
    ports:
      - "${PORT}:${PORT}"

  redis:
    image: redis:7
    container_name: futures-ai-redis
